name: Fetch and Sync Schedule

on:
  workflow_dispatch:
  schedule:
    # 5 AM–7 PM Eastern (09:00–23:55 UTC)
    - cron: "*/5 9-23 * * *"
    # 8 PM–11 PM Eastern (00:00–03:00 UTC)
    - cron: "*/5 0-3 * * *"

jobs:
  run-engine:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Add repo root to PYTHONPATH
        run: echo "PYTHONPATH=$PWD" >> $GITHUB_ENV

      - name: Run engine
        env:
          GOOGLE_SERVICE_ACCOUNT_KEY: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_KEY }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          ICS_URL: ${{ secrets.ICS_URL }}
          CAL_SUMNER: ${{ secrets.CAL_SUMNER }}
          CAL_BUTLER: ${{ secrets.CAL_BUTLER }}
          CAL_TURF: ${{ secrets.CAL_TURF }}
          CAL_BROOKVILLE: ${{ secrets.CAL_BROOKVILLE }}
        run: |
          python engine/run_full_sync.py
